<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>✨반짝반짝, 전문직 합격 기원!✨</title>
<style>
  @font-face { 
    font-family: 'OmuDaye';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-01@1.0/omyu_pretty.woff2') format('woff2');
    font-weight: normal;
    font-display: swap;
  }
  :root {
    --bg:#fffafa; --card:#ffffff; --ink:#201b35; --muted:#706b83;
    --primary:#7c61ff; --primary2:#f0ebff; --accent:#ffbf69;
    --ok:#229a68; --bad:#df4b4b; --line:#e8e1f5;
    --topic:#7c61ff; --topicSoft:#f0ebff; --topicLine:#ded2ff;
  }
  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; font-family:'OmuDaye', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 8% 0%, #fff2c9 0, transparent 28%),
      radial-gradient(circle at 98% 10%, #e9f3ff 0, transparent 26%),
      var(--bg);
    color:var(--ink);
    font-size:18px;
  }
  .app { max-width:1120px; margin:0 auto; padding:18px 16px 90px; }
  .top { display:flex; gap:12px; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
  h1 { font-size:30px; margin:0; letter-spacing:-.4px; color:#453071; line-height:1.15; }
  h2 { font-size:23px; margin:8px 0 8px; line-height:1.2; }
  .sub { color:var(--muted); font-size:16px; margin-top:6px; line-height:1.35; }
  .btns { display:flex; gap:8px; flex-wrap:wrap; }
  button {
    border:0; border-radius:16px; padding:10px 14px; font-size:17px; font-family:'OmuDaye', sans-serif;
    font-weight:700; cursor:pointer; background:var(--topicSoft); color:var(--topic);
    box-shadow:0 3px 10px rgba(79,61,180,.08);
  }
  button.primary { background:linear-gradient(135deg, #7c61ff, #ff8ec7); color:#fff; }
  button.warn { background:#fff0f0; color:var(--bad); }
  button.good { background:#eaf8f1; color:var(--ok); }
  button.ghost { background:#fff; color:var(--muted); border:1px solid var(--line); box-shadow:none; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:12px; }
  .card {
    background:rgba(255,255,255,.94); border:1px solid var(--topicLine); border-radius:24px;
    padding:16px; box-shadow:0 10px 24px rgba(65,56,110,.08);
  }
  .topic-card { min-height:140px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; transition:.16s transform, .16s box-shadow; }
  .topic-card:hover { transform:translateY(-2px); box-shadow:0 14px 28px rgba(65,56,110,.12); }
  .num { width:32px; height:32px; display:inline-grid; place-items:center; background:var(--topicSoft); color:var(--topic); border-radius:12px; font-weight:900; }
  .topic-title { font-size:18px; font-weight:900; line-height:1.18; margin:10px 0; letter-spacing:-.2px; word-break:keep-all; }
  .topic-card .topic-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chips { display:flex; gap:5px; flex-wrap:wrap; }
  .chip { background:var(--topicSoft); color:var(--topic); padding:5px 8px; border-radius:999px; font-size:13px; font-weight:700; line-height:1; }
  .view { display:none; }
  .view.active { display:block; }
  .section-box {
    background:#fff; border:1px solid var(--topicLine); border-radius:20px; padding:12px;
    box-shadow:0 8px 20px rgba(65,56,110,.07); margin-top:10px;
  }
  .meta-grid { display:grid; gap:9px; }
  .meta-card { border:1px solid var(--topicLine); border-radius:16px; padding:11px 12px; background:#fff; }
  .meta-title { display:inline-block; padding:5px 10px; border-radius:999px; font-size:15px; font-weight:900; margin-bottom:6px; }
  .meta-title.evidence { background:#eef4ff; color:#2f80ed; }
  .meta-title.law { background:#fff0f6; color:#c43b75; }
  .meta-title.purpose { background:#eafaf0; color:#16804a; }
  .meta-title.principle { background:#fff7df; color:#b36b00; }
  .meta-title.expected { background:#f0ebff; color:#6d4ee8; }
  .meta-card ul { margin:4px 0 0 18px; padding:0; }
  .meta-card li { margin:3px 0; line-height:1.45; }
  .meta-card p { margin:3px 0 0; line-height:1.5; }
  .content { font-size:21px; line-height:1.68; white-space:pre-line; word-break:keep-all; }
  .content.keywords { font-size:18px; line-height:1.8; }
  .kw { font-weight:900; color:#3d2b83; background:linear-gradient(transparent 58%, var(--topicSoft) 58%); border-radius:4px; padding:0 2px; }
  .pill-title { font-size:16px; color:var(--topic); margin-bottom:8px; font-weight:900; }
  .hidden { display:none !important; }
  .quiz-main { display:grid; gap:14px; }
  .hint {
    font-size:32px; font-weight:900; letter-spacing:2px; text-align:center; background:#fff9e8;
    border:1px dashed #ffc44f; padding:18px; border-radius:22px; word-break:keep-all;
  }
  input {
    width:100%; padding:14px 16px; border-radius:16px; border:1px solid var(--line);
    font-size:19px; outline:none; background:#fff; font-family:'OmuDaye', sans-serif;
  }
  .answer { background:#f6fff9; border:1px solid #bfe8d3; color:#176a47; padding:14px; border-radius:18px; line-height:1.65; font-size:18px; }
  .small { color:var(--muted); font-size:15px; line-height:1.45; }
  .wrong-item { border-left:5px solid var(--bad); }
  .stat { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 12px; }
  .stat span { background:#fff; border:1px solid var(--line); border-radius:999px; padding:7px 10px; font-size:15px; font-weight:800; }
  @media (max-width: 680px) {
    body { font-size:17px; }
    .app { padding:14px 12px 80px; }
    .top { display:block; }
    .top .btns { margin-top:10px; }
    h1 { font-size:25px; }
    h2 { font-size:20px; }
    .sub { font-size:14px; }
    .grid { grid-template-columns:1fr; gap:10px; }
    .card { border-radius:20px; padding:14px; }
    .topic-card { min-height:116px; }
    .topic-title { font-size:16px; margin:8px 0; }
    .topic-card .topic-title { white-space:nowrap; }
    .chip { font-size:11px; padding:4px 7px; max-width:31%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    button { font-size:15px; padding:9px 12px; border-radius:14px; }
    .content { font-size:18px; line-height:1.62; }
    .section-box { padding:10px; border-radius:18px; }
    .meta-card { padding:9px 10px; border-radius:14px; }
    .meta-card li { line-height:1.38; }
    .content.keywords { font-size:16px; }
    .hint { font-size:26px; padding:14px; }
  }
</style>
</head>
<body>
<div class="app">
  <div id="home" class="view active">
    <div class="top">
      <div>
        <h1>✨반짝반짝, 전문직 합격 기원!✨</h1>
        <div class="sub">🍀주제를 고른 뒤 확인하세요. 합격합시다.⭐</div>
      </div>
      <div class="btns">
        <button class="primary" onclick="openQuiz(false)">퀴즈 모드</button>
        <button class="ghost" onclick="openWrong()">오답노트</button>
      </div>
    </div>
    <div class="stat" id="homeStat"></div>
    <div class="grid" id="topicGrid"></div>
  </div>

  <div id="detail" class="view">
    <div class="top">
      <div>
        <button class="ghost" onclick="showView('home')">← 첫페이지</button>
        <h2 id="detailTitle"></h2>
        <div class="sub">버튼을 눌러 필요한 부분만 펼쳐 보세요.</div>
      </div>
    </div>
    <div class="btns" id="detailButtons"></div>
    <div class="section-box">
      <div class="pill-title" id="sectionTitle">서론</div>
      <div class="content" id="sectionContent"></div>
    </div>
  </div>

  <div id="quiz" class="view">
    <div class="top">
      <div>
        <button class="ghost" onclick="showView('home')">← 첫페이지</button>
        <h2 id="quizTitle">키워드 초성 퀴즈</h2>
        <div class="sub">초성을 보고 핵심 키워드를 떠올려 보세요. 틀린 것은 오답노트에 저장됩니다.</div>
      </div>
    </div>
    <div class="quiz-main">
      <div class="card">
        <div class="small" id="quizTopic"></div>
        <div class="hint" id="quizHint"></div>
      </div>
      <input id="quizInput" placeholder="떠오르는 키워드를 입력하세요" onkeydown="if(event.key==='Enter')checkAnswer()" />
      <div class="btns">
        <button class="primary" onclick="checkAnswer()">정답 확인</button>
        <button class="ghost" onclick="showAnswer()">답 보기</button>
        <button class="warn" onclick="markWrong()">틀렸어요</button>
        <button class="good" onclick="nextQuiz()">다음 문제</button>
      </div>
      <div id="quizResult" class="answer hidden"></div>
    </div>
  </div>

  <div id="wrong" class="view">
    <div class="top">
      <div>
        <button class="ghost" onclick="showView('home')">← 첫페이지</button>
        <h2>오답노트</h2>
        <div class="sub">틀린 키워드만 다시 볼 수 있습니다. 브라우저에 자동 저장됩니다.</div>
      </div>
      <div class="btns">
        <button class="primary" onclick="openQuiz(true)">오답만 퀴즈</button>
        <button class="warn" onclick="clearWrong()">오답노트 비우기</button>
      </div>
    </div>
    <div id="wrongList" class="grid"></div>
  </div>
</div>

<script>
const DATA = [
  {
    "no": 1,
    "topic": "독서·인문교육과 문해력 기반 자기주도성 신장",
    "intro": "AI 시대에는 정보를 많이 아는 것보다 읽고, 해석하고, 질문하며, 자신의 생각을 논리적으로 표현하는 힘이 중요하다. 충남교육의 독서·인문교육과 온독지수, 독서토론, 질문하는 학교를 연결하여 학생의 자기주도성을 키우는 지원이 필요하다.",
    "keywords": "독서·인문교육, 문해력, 온독지수, 독서토론, 질문하는 학교, 사고도구어, 올바른 한글사용, 지역서점 활성화",

    "s2": "국어과에 한정하지 않고 교과 연계 독서토론, 질문 생성 활동, 한 학기 한 권 읽기, 온독지수 활용 수업 사례를 묶은 실행 자료를 보급하고 학교 방문 컨설팅으로 교육과정 안착을 지원한다.",
    "s3": "배움자리, 정책나눔자리, 마주봄자리 형태의 연수를 통해 교사가 질문 설계, 독서토론 촉진, 문해력 평가와 피드백을 실제 수업에 적용할 수 있도록 역량을 높인다.",
    "s4": "학생 독서동아리, 질문탐구 모임, 글쓰기 공모, 우리말 우리글 활동을 지원하고 읽기 어려움이 큰 학생은 맞춤형 자료와 연계 프로그램으로 기초 문해력까지 보완한다.",
    "s5": "지역서점, 공공도서관, 마을 인문자원과 연계한 독서인문 프로그램을 확산하고, 우수사례 나눔과 성과 공유회를 통해 학교별 실천 모델을 일반화한다.",
    "kick": "온독지수 결과를 단순 진단으로 끝내지 않고 독서토론 주제 선정, 질문 수준 조정, 쓰기 피드백까지 연결하는 수업-평가-기록 패키지로 제안하면 차별성이 생긴다."
  },
  {
    "no": 2,

    "keywords": "맞춤학력 책임교육, 충남온학력 3단계 지원망, 온채움, 온한글, 학습종합클리닉센터, 두드림학교, 책임교육학년제, 기초학력진단보정시스템",
    "s1": "학교가 기초학력 진단과 지원을 안정적으로 운영할 수 있도록 지원청 단위 맞춤학력 지원단을 구성하고, 온채움·온한글 활용 지침과 학생 지원 절차를 표준화하여 보급한다.",
    "s2": "학년 초 진단, 보정학습, 향상도 점검이 교육과정 속에서 자연스럽게 이어지도록 책임교육학년제 운영 자료와 교과보충·학습도약 계절학기 모델을 학교 여건에 맞게 컨설팅한다.",

    "s4": "학교 1차 지원으로 해결이 어려운 학생은 학습종합클리닉센터와 연계해 난독, 경계선지능, 정서·행동 요인을 함께 살피고 학생별 지원계획 수립을 촘촘히 지원한다.",
    "s5": "지원 결과를 성장기록으로 누적 관리하고 교육지원청별 우수사례를 발굴·확산하여 예산, 인력, 자료 지원이 학생 성장으로 이어지는 환류 체계를 구축한다.",

  {

    "kick": "충남형 IB학교를 별도 사업으로 보지 말고 일반학교 수업 혁신의 모델학교로 위치 지우며, IB의 개념·탐구를 질문하는 학교 확산의 언어로 번역해 제시하면 설득력이 높다."
  },
  {
    "no": 4,

function setTheme(no) {
  const c = TOPIC_COLORS[(no - 1) % TOPIC_COLORS.length];
  document.documentElement.style.setProperty('--topic', c[0]);
  document.documentElement.style.setProperty('--topicSoft', c[1]);
  document.documentElement.style.setProperty('--topicLine', c[2]);
}
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function highlightKeywords(text, topic) {
  let html = escapeHtml(text);
  const kws = topic.keywords.split(',').map(k => k.trim()).filter(Boolean).sort((a,b)=>b.length-a.length);
  kws.forEach(k => {
    const safe = escapeHtml(k).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    html = html.replace(new RegExp(safe, 'g'), `<span class="kw">${escapeHtml(k)}</span>`);
  });
  return html;
}

const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function initialOfText(text) {
  return text.split("").map(ch => {
    const code = ch.charCodeAt(0) - 44032;
    if (code >= 0 && code <= 11171) return cho[Math.floor(code / 588)];
    if (/[a-zA-Z0-9]/.test(ch)) return ch;
    if (ch === " " || ch === "·" || ch === "-" || ch === ",") return ch;
    return "";
  }).join("").replace(/\s+/g," ").trim();
}
function normalize(s) {
  return (s || "").toLowerCase().replace(/[\s·,，.()\-_/]/g,"");
}

function renderHome() {
  const grid = document.getElementById("topicGrid");
  grid.innerHTML = DATA.map(t => {
    const c = TOPIC_COLORS[(t.no - 1) % TOPIC_COLORS.length];
    const chips = t.keywords.split(",").slice(0,3).map(k=>`<span class="chip" style="background:${c[1]}; color:${c[0]}">${k.trim()}</span>`).join("");
    return `<div class="card topic-card" onclick="openTopic(${t.no})" style="--topic:${c[0]}; --topicSoft:${c[1]}; --topicLine:${c[2]}; border-color:${c[2]}">
      <div><span class="num" style="background:${c[1]}; color:${c[0]}">${t.no}</span><div class="topic-title" title="${t.topic}">${t.topic}</div></div>
      <div class="chips">${chips}</div>

  }).join("");

}

  document.getElementById("detailTitle").textContent = currentTopic.no + ". " + currentTopic.topic;
  document.getElementById("detailButtons").innerHTML = SECTIONS.map(([key,label]) =>
    `<button onclick="setSection('${key}')">${label}</button>`).join("");
  setSection("intro");
  showView("detail");
}

function listHtml(items) {
  return `<ul>${(items || []).map(x => `<li>${highlightKeywords(x, currentTopic)}</li>`).join("")}</ul>`;
}
function renderMeta(topic) {
  return `<div class="meta-grid">
    <div class="meta-card"><div class="meta-title evidence">📚 정책 근거 및 참고 자료</div><p>${highlightKeywords(topic.evidence || '', topic)}</p></div>
    <div class="meta-card"><div class="meta-title law">⚖️ 관련 법령</div>${listHtml(topic.laws)}</div>
    <div class="meta-card"><div class="meta-title purpose">🎯 목적</div>${listHtml(topic.purpose)}</div>
    <div class="meta-card"><div class="meta-title principle">🧭 방침</div>${listHtml(topic.principles)}</div>
    <div class="meta-card"><div class="meta-title expected">🌱 기대효과</div>${listHtml(topic.expected)}</div>
  </div>`;
}
function setSection(key) {
  const label = SECTIONS.find(s=>s[0]===key)[1];
  document.getElementById("sectionTitle").textContent = label;
  const el = document.getElementById("sectionContent");
  if (key === "meta") {
    el.innerHTML = renderMeta(currentTopic);
    el.className = "content meta-content";
    return;
  }
  el.innerHTML = highlightKeywords(currentTopic[key], currentTopic);
  el.className = key === "keywords" ? "content keywords" : "content";
}
function makeQuizItems() {
  const items = [];
  DATA.forEach(t => {
    t.keywords.split(",").map(x=>x.trim()).filter(Boolean).forEach(k => {
      items.push({ topic:t.topic, topicNo:t.no, answer:k, hint:initialOfText(k) });
    });
  });
  return items;
}
function openQuiz(onlyWrong) {
  wrongOnly = onlyWrong;
  const wrong = getWrong();
  quizPool = onlyWrong ? wrong : makeQuizItems();
  if (quizPool.length === 0) {
    alert("오답노트가 비어 있습니다.");
    return;
  }
  document.getElementById("quizTitle").textContent = onlyWrong ? "오답 키워드 퀴즈" : "키워드 초성 퀴즈";
  showView("quiz");
  nextQuiz();
}
function nextQuiz() {
  document.getElementById("quizResult").classList.add("hidden");
  document.getElementById("quizInput").value = "";
  currentQuiz = quizPool[Math.floor(Math.random() * quizPool.length)];
  setTheme(currentQuiz.topicNo);
  document.getElementById("quizTopic").textContent = currentQuiz.topicNo + ". " + currentQuiz.topic;
  document.getElementById("quizHint").textContent = currentQuiz.hint || "힌트 없음";
  document.getElementById("quizInput").focus();
}
function checkAnswer() {
  const input = document.getElementById("quizInput").value;
  const ok = normalize(input).includes(normalize(currentQuiz.answer)) || normalize(currentQuiz.answer).includes(normalize(input));
  const result = document.getElementById("quizResult");
  result.classList.remove("hidden");
  if (input.trim().length < 1) {
    result.innerHTML = "입력한 답이 없습니다.";
    return;
  }
  if (ok) {
    result.innerHTML = "정답입니다!<br>정답: " + currentQuiz.answer;
    removeWrong(currentQuiz, false);
  } else {
    result.innerHTML = "아직 다릅니다.<br>정답: " + currentQuiz.answer;
    addWrong(currentQuiz);
  }
}
function showAnswer() {
  const result = document.getElementById("quizResult");
  result.classList.remove("hidden");
  result.innerHTML = "정답: " + currentQuiz.answer;
}
function sameItem(a,b) {
  return a.topicNo === b.topicNo && a.answer === b.answer;
}
function addWrong(item) {
  const wrong = getWrong();
  if(!wrong.some(w=>sameItem(w,item))) wrong.push(item);
  saveWrong(wrong);
}
function removeWrong(item, alertOn=true) {
  const wrong = getWrong().filter(w=>!sameItem(w,item));
  saveWrong(wrong);
  if(alertOn) renderWrong();
}
function markWrong() {
  addWrong(currentQuiz);
  showAnswer();
}
function openWrong() {
  renderWrong();
  showView("wrong");
}
function renderWrong() {
  const wrong = getWrong();
  const box = document.getElementById("wrongList");
  if (wrong.length === 0) {
    box.innerHTML = `<div class="card">아직 저장된 오답이 없습니다.</div>`;
    return;
  }
  box.innerHTML = wrong.map((w,i)=>`<div class="card wrong-item">
    <div class="small">${w.topicNo}. ${w.topic}</div>
    <div class="topic-title">${w.answer}</div>
    <div class="hint" style="font-size:22px; padding:10px;">${w.hint}</div>
    <button class="good" onclick='removeWrong(${JSON.stringify(w)})'>외웠어요</button>
  </div>`).join("");
}
function clearWrong() {
  if(confirm("오답노트를 모두 비울까요?")) {
    saveWrong([]);
    renderWrong();
  }
}
renderHome();
</script>
</body>
</html>
